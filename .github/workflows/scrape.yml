name: Hourly Confluence Scrape

on:
  schedule:
    - cron: '0 * * * *' # Runs at the start of every hour
  workflow_dispatch:      # Allows you to click a button to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Required to save the history.json and index.html back to repo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Scraper
        run: python Bias.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # IMPORTANT: This adds BOTH the website and the memory file
          git add index.html history.json
          
          # This saves the changes to your repository
          git commit -m "Update Dashboard, History and Duration" || exit 0
          
          # This pushes the files so the next run can see the previous hour
          git push
