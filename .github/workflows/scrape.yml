name: Hourly Confluence Scrape

on:
  schedule:
    # This runs every hour, Monday through Friday
    # And starts late Sunday (22:00 UTC) when Sydney opens
    - cron: '0 * * * 1-5'
    - cron: '0 22,23 * * 0'
  workflow_dispatch:      # Still lets you run it manually anytime

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Scraper
        run: python Bias.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add index.html history.json
          git commit -m "Market Update" || exit 0
          git push
